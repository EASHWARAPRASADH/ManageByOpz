# ══════════════════════════════════════════════════════════════
# ManageMyOpz HR Platform — Application Configuration
# ══════════════════════════════════════════════════════════════

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: managemyopz-hr-platform

  # ── Database ──────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/managemyopz_hr?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: Dhipak#2006#
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # ── JPA / Hibernate ──────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        generate_statistics: false

  # ── Flyway ──────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false
    placeholder-replacement: false

  # ── Jackson ──────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  # ── Mail (Notification Platform) ──────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── Server ──────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api

# ── Platform Configuration ──────────────────────────────────
platform:
  security:
    jwt:
      secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBIUyA1MTIgYWxnb3JpdGhtIHRoYXQgbmVlZHMgdG8gYmUgYXQgbGVhc3QgNjQgYnl0ZXMgbG9uZw==}
      expiration: 28800000
      refresh-expiration: 604800000
    cors:
      allowed-origins: http://localhost:5173,http://localhost:3000

# ── Actuator ──────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ──────────────────────────────────────────────
logging:
  level:
    com.managemyopz: DEBUG
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{tenantId}] %-5level %logger{36} - %msg%n"
