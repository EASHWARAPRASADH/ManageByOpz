version: '3.8'

services:
  # ── MySQL 8 ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: managemyopz-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: managemyopz_hr
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=caching_sha2_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: managemyopz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── MinIO (Object Storage) ──────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: managemyopz-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ── OpenSearch ──────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: managemyopz-opensearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  # ── Prometheus ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: managemyopz-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # ── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: managemyopz-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  mysql_data:
  redis_data:
  minio_data:
  opensearch_data:
