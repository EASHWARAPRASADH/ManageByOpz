# Test profile — uses MySQL database
spring.datasource.url=${TEST_DATABASE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_TEST_DATABASE:connectit_db_test}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:${MYSQL_USER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQL_PASSWORD:}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=
spring.flyway.enabled=false
spring.mail.host=${EMAIL_HOST:${SMTP_HOST:smtp-relay.brevo.com}}
spring.mail.port=${EMAIL_PORT:${SMTP_PORT:587}}
spring.mail.username=${EMAIL_USER:${SMTP_USER:support@technosprint.net}}
spring.mail.password=${EMAIL_PASSWORD:${SMTP_PASS:Poland@01}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
logging.level.root=WARN
